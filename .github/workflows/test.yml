name: test

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy webrtcvad-wheels
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile main.py rttranslate/*.py
      - run: bash -n run.sh install.sh translate scripts/*.sh
